# Production Server settings
server.port=${PORT:8080}

# Persisted H2 database file storage for production container consistency
spring.datasource.url=jdbc:h2:file:./data/syfe_finance_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=secure_prod_password_123!

# JPA/Hibernate parameters (Disable SQL logs in production for performance)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable H2 web console in production environments for security
spring.h2.console.enabled=false

# Session details
spring.session.store-type=none
