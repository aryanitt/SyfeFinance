# Production Server settings
server.port=${PORT:8080}

# PostgreSQL database configuration for persistent production data
spring.datasource.url=jdbc:${RENDER_DATABASE_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA/Hibernate parameters (Disable SQL logs in production for performance)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable H2 web console in production environments for security
spring.h2.console.enabled=false

# Session details
spring.session.store-type=none
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

